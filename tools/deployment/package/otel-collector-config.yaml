extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: "30s"
    send_batch_size: 1024

exporters:
  otlphttp:
    endpoint: "${env:CLP_TELEMETRY_ENDPOINT}"

service:
  extensions: ["health_check"]
  pipelines:
    metrics:
      receivers: ["otlp"]
      processors: ["batch"]
      exporters: ["otlphttp"]
    traces:
      receivers: ["otlp"]
      processors: ["batch"]
      exporters: ["otlphttp"]
    logs:
      receivers: ["otlp"]
      processors: ["batch"]
      exporters: ["otlphttp"]
