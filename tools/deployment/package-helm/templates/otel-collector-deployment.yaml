{{- if and .Values.clpConfig.telemetry (not .Values.clpConfig.telemetry.disable) }}
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: {{ include "clp.fullname" . }}-otel-collector
  labels:
    {{- include "clp.labels" . | nindent 4 }}
    app.kubernetes.io/component: "otel-collector"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "clp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: "otel-collector"
  template:
    metadata:
      labels:
        {{- include "clp.labels" . | nindent 8 }}
        app.kubernetes.io/component: "otel-collector"
    spec:
      containers:
        - name: otel-collector
          image: {{ .Values.clpConfig.telemetry.collector.image | quote }}
          command:
            - "/otelcontribcol"
            - "--config=/etc/otelcol-contrib/config.yaml"
          ports:
            - containerPort: 4318
              protocol: TCP
          resources:
            {{- toYaml .Values.clpConfig.telemetry.collector.resources | nindent 12 }}
          volumeMounts:
            - name: otel-collector-config
              mountPath: /etc/otelcol-contrib
      volumes:
        - name: otel-collector-config
          configMap:
            name: {{ include "clp.fullname" . }}-otel-collector-config
{{- end }}