apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: {{ include "clp.fullname" . }}-config
  labels:
    {{- include "clp.labels" . | nindent 4 }}
data:
  clp-config.yaml: |
    {{- with .Values.clpConfig.api_server }}
    api_server:
      default_max_num_query_results: {{ .default_max_num_query_results | int }}
      host: "localhost"
      port: 3001
      query_job_polling:
        initial_backoff_ms: {{ .query_job_polling.initial_backoff_ms | int }}
        max_backoff_ms: {{ .query_job_polling.max_backoff_ms | int }}
    {{- else }}
    api_server: null
    {{- end }}
    archive_output:
      compression_level: {{ .Values.clpConfig.archive_output.compression_level | int }}
      {{- with .Values.clpConfig.archive_output.storage }}
      storage:
        {{- if eq .type "fs" }}
        directory: "/var/data/archives"
        type: "fs"
        {{- else if eq .type "s3" }}
        type: "s3"
        staging_directory: "/var/data/staged-archives"
        {{- with .s3_config }}
        s3_config:
          {{- if .endpoint_url }}
          endpoint_url: {{ .endpoint_url | quote }}
          {{- end }}
          {{- if .region_code }}
          region_code: {{ .region_code | quote }}
          {{- end }}
          bucket: {{ .bucket | quote }}
          key_prefix: {{ .key_prefix | quote }}
          {{- with .aws_authentication }}
          aws_authentication:
            type: {{ .type | quote }}
            {{- if .profile }}
            profile: {{ .profile | quote }}
            {{- end }}
            {{- if .credentials }}
            credentials:
              access_key_id: {{ .credentials.access_key_id | quote }}
              secret_access_key: {{ .credentials.secret_access_key | quote }}
              {{- if .credentials.session_token }}
              session_token: {{ .credentials.session_token | quote }}
              {{- end }}
            {{- end }}
          {{- end }}{{/* with .aws_authentication */}}
        {{- end }}{{/* with .s3_config */}}
        {{- end }}{{/* if eq .type "fs" */}}
      {{- end }}{{/* with .Values.clpConfig.archive_output.storage */}}
      {{- if .Values.clpConfig.archive_output.retention_period }}
      retention_period: {{ .Values.clpConfig.archive_output.retention_period | int }}
      {{- else }}
      retention_period: null
      {{- end }}
      target_archive_size: {{ .Values.clpConfig.archive_output.target_archive_size | int }}
      target_dictionaries_size: {{ .Values.clpConfig.archive_output.target_dictionaries_size
        | int }}
      target_encoded_file_size: {{ .Values.clpConfig.archive_output.target_encoded_file_size
        | int }}
      target_segment_size: {{ .Values.clpConfig.archive_output.target_segment_size
        | int }}
    {{- if include "clp.spiderOrchestrationEnabled" . }}
    compression_coordinator:
      service_name: {{ .Values.clpConfig.compression_coordinator.service_name | quote }}
      jobs_poll_delay: {{ .Values.clpConfig.compression_coordinator.jobs_poll_delay }}
      termination_timeout_seconds: {{
        .Values.clpConfig.compression_coordinator.termination_timeout_seconds | int }}
      logging_level: {{ .Values.clpConfig.compression_coordinator.logging_level | quote }}
    spider:
      host: "{{ include "clp.spiderStorageHost" . }}"
      port: 50051
    {{- end }}
    compression_scheduler:
      jobs_poll_delay: {{ .Values.clpConfig.compression_scheduler.jobs_poll_delay }}
      logging_level: {{ .Values.clpConfig.compression_scheduler.logging_level | quote }}
      max_concurrent_tasks_per_job: {{
        .Values.clpConfig.compression_scheduler.max_concurrent_tasks_per_job | int }}
      telemetry_update_interval_ms: {{ .Values.clpConfig.compression_scheduler.telemetry_update_interval_ms | int }}
    compression_worker:
      logging_level: {{ .Values.clpConfig.compression_worker.logging_level | quote }}
      task_soft_time_limit: {{ .Values.clpConfig.compression_worker.task_soft_time_limit | int }}
      task_time_limit: {{ .Values.clpConfig.compression_worker.task_time_limit | int }}
      telemetry_update_interval_ms: {{ .Values.clpConfig.compression_worker.telemetry_update_interval_ms | int }}
    data_directory: "/var/data"
    garbage_collector:
      logging_level: {{ .Values.clpConfig.garbage_collector.logging_level | quote }}
      sweep_interval:
        archive: {{ .Values.clpConfig.garbage_collector.sweep_interval.archive | int }}
        search_result: {{ .Values.clpConfig.garbage_collector.sweep_interval.search_result | int }}
    database:
      auto_commit: false
      compress: true
      host: "{{ include "clp.databaseHost" . }}"
      names:
        clp: {{ .Values.clpConfig.database.names.clp | quote }}
        spider: {{ .Values.clpConfig.database.names.spider | quote }}
      port: {{ include "clp.databasePort" . | int }}
      ssl_cert: null
      type: {{ .Values.clpConfig.database.type | quote }}
    logs_directory: "/var/log"
    {{- with .Values.clpConfig.logs_input }}
    logs_input:
      {{- if eq .type "fs" }}
      directory: "/mnt/logs"
      type: "fs"
      {{- else if eq .type "s3" }}
      type: "s3"
      {{- with .aws_authentication }}
      aws_authentication:
        type: {{ .type | quote }}
        {{- if .profile }}
        profile: {{ .profile | quote }}
        {{- end }}
        {{- if .credentials }}
        credentials:
          access_key_id: {{ .credentials.access_key_id | quote }}
          secret_access_key: {{ .credentials.secret_access_key | quote }}
          {{- if .credentials.session_token }}
          session_token: {{ .credentials.session_token | quote }}
          {{- end }}
        {{- end }}
      {{- end }}{{/* with .aws_authentication */}}
      {{- end }}{{/* if eq .type "fs" */}}
    {{- end }}{{/* with .Values.clpConfig.logs_input */}}
    {{- with .Values.clpConfig.log_ingestor }}
    log_ingestor:
      host: "localhost"
      logging_level: {{ .logging_level | quote }}
      port: 3002
    {{- else }}
    log_ingestor: null
    {{- end }}
    package:
      storage_engine: {{ .Values.clpConfig.package.storage_engine | quote }}
    {{- with .Values.clpConfig.query_scheduler }}
    query_scheduler:
      host: "{{ include "clp.fullname" $ }}-query-scheduler"
      jobs_poll_delay: {{ .jobs_poll_delay }}
      logging_level: {{ .logging_level | quote }}
      num_archives_to_search_per_sub_job: {{ .num_archives_to_search_per_sub_job | int }}
      port: 7000
      scheduler_concurrency: {{ .scheduler_concurrency | int }}
      telemetry_update_interval_ms: {{ .telemetry_update_interval_ms | int }}
    {{- end }}
    {{- with .Values.clpConfig.query_worker }}
    query_worker:
      logging_level: {{ .logging_level | quote }}
      task_soft_time_limit: {{ .task_soft_time_limit | int }}
      task_time_limit: {{ .task_time_limit | int }}
      telemetry_update_interval_ms: {{ .telemetry_update_interval_ms | int }}
      query_trace_sampling_probability: {{ .query_trace_sampling_probability | float64 }}
    {{- end }}
    queue:
      host: "{{ include "clp.queueHost" . }}"
      port: {{ include "clp.queuePort" . | int }}
    redis:
      compression_backend_database: {{ .Values.clpConfig.redis.compression_backend_database | int }}
      host: "{{ include "clp.redisHost" . }}"
      port: {{ include "clp.redisPort" . | int }}
      query_backend_database: {{ .Values.clpConfig.redis.query_backend_database | int }}
    {{- with .Values.clpConfig.reducer }}
    reducer:
      base_port: 14009
      host: "{{ include "clp.fullname" $ }}-reducer"
      logging_level: {{ .logging_level | quote }}
      upsert_interval: {{ .upsert_interval | int }}
    {{- end }}
    results_cache:
      db_name: {{ .Values.clpConfig.results_cache.db_name | quote }}
      host: "{{ include "clp.resultsCacheHost" . }}"
      port: {{ include "clp.resultsCachePort" . | int }}
      {{- if .Values.clpConfig.results_cache.retention_period }}
      retention_period: {{ .Values.clpConfig.results_cache.retention_period | int }}
      {{- else }}
      retention_period: null
      {{- end }}
      stream_collection_name: {{ .Values.clpConfig.results_cache.stream_collection_name | quote }}
    otel_collector:
      host: "{{ include "clp.otelCollectorHost" . }}"
      port: {{ include "clp.otelCollectorPort" . | int }}
    {{- with .Values.clpConfig.stream_output }}
    stream_output:
      {{- with .storage }}
      storage:
        {{- if eq .type "fs" }}
        directory: "/var/data/streams"
        type: "fs"
        {{- else if eq .type "s3" }}
        type: "s3"
        staging_directory: "/var/data/staged-streams"
        {{- with .s3_config }}
        s3_config:
          {{- if .endpoint_url }}
          endpoint_url: {{ .endpoint_url | quote }}
          {{- end }}
          {{- if .region_code }}
          region_code: {{ .region_code | quote }}
          {{- end }}
          bucket: {{ .bucket | quote }}
          key_prefix: {{ .key_prefix | quote }}
          {{- with .aws_authentication }}
          aws_authentication:
            type: {{ .type | quote }}
            {{- if .profile }}
            profile: {{ .profile | quote }}
            {{- end }}
            {{- if .credentials }}
            credentials:
              access_key_id: {{ .credentials.access_key_id | quote }}
              secret_access_key: {{ .credentials.secret_access_key | quote }}
              {{- if .credentials.session_token }}
              session_token: {{ .credentials.session_token | quote }}
              {{- end }}
            {{- end }}
          {{- end }}{{/* with .aws_authentication */}}
        {{- end }}{{/* with .s3_config */}}
        {{- end }}{{/* if eq .type "fs" */}}
      {{- end }}{{/* with .storage */}}
      target_uncompressed_size: {{ .target_uncompressed_size | int }}
    {{- end }}{{/* with .Values.clpConfig.stream_output */}}
    tmp_directory: "/var/tmp"
    {{- if .Values.clpConfig.aws_config }}
    aws_config_directory: {{ include "clp.awsConfigMountPath" . | quote }}
    {{- end }}
    webui:
      host: "localhost"
      port: 4000
      query_engine: {{ .Values.clpConfig.webui.query_engine | quote }}
      presto_max_num_search_results: {{ .Values.clpConfig.webui.presto_max_num_search_results
        | int }}
      rate_limit: {{ .Values.clpConfig.webui.rate_limit | int }}
      results_metadata_collection_name: {{ .Values.clpConfig.webui.results_metadata_collection_name
        | quote }}
    {{- with .Values.clpConfig.mcp_server }}
    mcp_server:
      host: "localhost"
      port: 8000
      logging_level: {{ .logging_level | quote }}
    {{- else }}
    mcp_server: null
    {{- end }}
    {{- if .Values.clpConfig.presto }}
    presto:
      host: "{{ include "clp.prestoHost" . }}"
      port: {{ include "clp.prestoPort" . | int }}
    {{- else }}
    presto: null
    {{- end }}

  mysql-logging.cnf: |
    [mysqld]
    # Both MySQL and MariaDB Docker images default error log to stderr, so no
    # log_error override is needed. General log is not enabled because the
    # database process runs as a non-root user that cannot write to /dev/stdout.

  redis.conf: |
    # For full reference of configuration options see
    # https://raw.githubusercontent.com/redis/redis/7.2/redis.conf

    databases 2
    logfile ""

  mongod.conf: |
    replication:
      replSetName: "rs0"
    systemLog:
      timeStampFormat: iso8601-local

  webui-settings.json: |
    {
      "public": {
        "ClpQueryEngine": {{ .Values.clpConfig.webui.query_engine | quote }},
        "ClpStorageEngine": {{ .Values.clpConfig.package.storage_engine | quote }},

        {{- if eq .Values.clpConfig.logs_input.type "fs" }}
        "LogsInputRootDir": "/mnt/logs",
        {{- else }}
        "LogsInputRootDir": null,
        {{- end }}
        "LogsInputType": {{ .Values.clpConfig.logs_input.type | quote }},

        {{- if .Values.clpConfig.query_scheduler }}
        {{- with .Values.clpConfig.query_scheduler.max_datasets_per_query }}
        "MaxDatasetsPerQuery": {{ . | int }},
        {{- else }}
        "MaxDatasetsPerQuery": null,
        {{- end }}
        {{- else }}
        "MaxDatasetsPerQuery": null,
        {{- end }}

        "PrestoMaxNumSearchResults":
          {{ .Values.clpConfig.webui.presto_max_num_search_results | int }},

        "SqlDbClpArchivesTableName": "clp_archives",
        "SqlDbClpDatasetsTableName": "clp_datasets",
        "SqlDbClpFilesTableName": "clp_files",
        "SqlDbClpTablePrefix": "clp_",
        "SqlDbCompressionJobsTableName": "compression_jobs",

        "MongoDbSearchResultsMetadataCollectionName":
          {{ .Values.clpConfig.webui.results_metadata_collection_name | quote }}
      },
      "server": {
        "SqlDbHost": "{{ include "clp.databaseHost" . }}",
        "SqlDbName": {{ .Values.clpConfig.database.names.clp | quote }},
        "SqlDbPort": {{ include "clp.databasePort" . | int }},

        "SqlDbQueryJobsTableName": "query_jobs",

        "MongoDbHost": "{{ include "clp.resultsCacheHost" . }}",
        "MongoDbName": {{ .Values.clpConfig.results_cache.db_name | quote }},
        "MongoDbPort": {{ include "clp.resultsCachePort" . | int }},

        "MongoDbStreamFilesCollectionName":
          {{ .Values.clpConfig.results_cache.stream_collection_name | quote }},

        "ClientDir": "/opt/clp/var/www/webui/client",
        "LogViewerDir": "/opt/clp/var/www/webui/yscope-log-viewer",
        {{- if eq .Values.clpConfig.stream_output.storage.type "fs" }}
        "StreamFilesDir": "/var/data/streams",
        {{- else }}
        "StreamFilesDir": null,
        {{- end }}

        {{- if eq .Values.clpConfig.stream_output.storage.type "s3" }}
        {{- with .Values.clpConfig.stream_output.storage.s3_config }}
        "StreamFilesS3PathPrefix": {{ printf "%s/%s" .bucket .key_prefix | quote }},
        {{- if eq .aws_authentication.type "profile" }}
        "StreamFilesS3Profile": {{ .aws_authentication.profile | quote }},
        {{- else }}
        "StreamFilesS3Profile": null,
        {{- end }}
        {{- if .region_code }}
        "StreamFilesS3Region": {{ .region_code | quote }},
        {{- else }}
        "StreamFilesS3Region": null,
        {{- end }}
        {{- end }}{{/* with .Values.clpConfig.stream_output.storage.s3_config */}}
        {{- else }}
        "StreamFilesS3PathPrefix": null,
        "StreamFilesS3Profile": null,
        "StreamFilesS3Region": null,
        {{- end }}
        "StreamTargetUncompressedSize":
          {{ .Values.clpConfig.stream_output.target_uncompressed_size | int }},

        "ArchiveOutputCompressionLevel":
          {{ .Values.clpConfig.archive_output.compression_level | int }},
        "ArchiveOutputTargetArchiveSize":
          {{ .Values.clpConfig.archive_output.target_archive_size | int }},
        "ArchiveOutputTargetDictionariesSize":
          {{ .Values.clpConfig.archive_output.target_dictionaries_size | int }},
        "ArchiveOutputTargetEncodedFileSize":
          {{ .Values.clpConfig.archive_output.target_encoded_file_size | int }},
        "ArchiveOutputTargetSegmentSize":
          {{ .Values.clpConfig.archive_output.target_segment_size | int }},

        {{- if .Values.clpConfig.presto }}
        "PrestoHost": "{{ include "clp.prestoHost" . }}",
        "PrestoPort": {{ include "clp.prestoPort" . | int }}
        {{- else }}
        "PrestoHost": null,
        "PrestoPort": null
        {{- end }}
      }
    }

{{- if and .Values.clpConfig.presto (has "presto" .Values.clpConfig.bundled) }}
{{- with .Values.clpConfig.presto }}
  presto-coordinator-catalog-clp.properties: |
    connector.name=clp
    clp.metadata-provider-type=mysql
    clp.metadata-db-url=jdbc:mysql://{{ include "clp.databaseHost" $ }}:{{ include "clp.databasePort" $ }}
    clp.metadata-db-name={{ $.Values.clpConfig.database.names.clp }}
    clp.metadata-db-user={{ $.Values.credentials.database.username }}
    clp.metadata-db-password={{ $.Values.credentials.database.password }}
    clp.metadata-table-prefix=clp_
    clp.split-provider-type=mysql
    clp.split-filter-provider-type=mysql
    clp.split-filter-config=/opt/presto-server/etc/split-filter.json

  presto-coordinator-config-config.properties: |
    coordinator=true
    node-scheduler.include-coordinator=false
    http-server.http.port=8889
    query.max-memory={{ .coordinator.query_max_memory_gb }}GB
    query.max-memory-per-node={{ .coordinator.query_max_memory_per_node_gb }}GB
    discovery-server.enabled=true
    discovery.uri=http://{{ include "clp.fullname" $ }}-presto-coordinator:8889
    optimizer.optimize-hash-generation=false
    regex-library=RE2J
    use-alternative-function-signatures=true
    inline-sql-functions=false
    nested-data-serialization-enabled=false
    native-execution-enabled=true

  presto-coordinator-config-jvm.config: |
    -server
    -Xmx4G
    -XX:+UseG1GC
    -XX:G1HeapRegionSize=32M
    -XX:+UseGCOverheadLimit
    -XX:+ExplicitGCInvokesConcurrent
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:+ExitOnOutOfMemoryError
    -Djdk.attach.allowAttachSelf=true

  presto-coordinator-config-log.properties: |
    com.facebook.presto={{ .coordinator.logging_level }}

  presto-coordinator-config-node.properties: |
    node.environment=production
    node.id=presto-coordinator

  presto-coordinator-config-split-filter.json: |
    {{ .split_filter | toJson }}

  presto-worker-catalog-clp.properties: |
    connector.name=clp
    {{- with $.Values.clpConfig.archive_output.storage }}
    {{- if eq .type "s3" }}
    clp.storage-type=s3
    clp.s3-auth-provider=clp_package
    clp.s3-access-key-id={{ .s3_config.aws_authentication.credentials.access_key_id }}
    clp.s3-bucket={{ .s3_config.bucket }}
    {{- if .s3_config.endpoint_url }}
    clp.s3-end-point={{ trimSuffix "/" .s3_config.endpoint_url }}
    {{- else }}
    clp.s3-end-point=https://s3.{{ .s3_config.region_code }}.amazonaws.com
    {{- end }}
    clp.s3-secret-access-key={{ .s3_config.aws_authentication.credentials.secret_access_key }}
    {{- end }}{{/* if eq .type "s3" */}}
    {{- end }}{{/* with $.Values.clpConfig.archive_output.storage */}}

  presto-worker-config-config.properties: |
    discovery.uri=http://{{ include "clp.fullname" $ }}-presto-coordinator:8889
    http-server.http.port=8889
    query-memory-gb={{ .worker.query_memory_gb }}
    shutdown-onset-sec=1
    system-memory-gb={{ .worker.system_memory_gb }}
    register-test-functions=false
    runtime-metrics-collection-enabled=false

  presto-worker-config-node.properties: |
    node.environment=production
    node.location=worker-location

  presto-worker-config-velox.properties: |
    mutable-config=true

  presto-worker-setup-configs.sh: |
    #!/bin/sh
    set -e

    CONFIG_TEMPLATE_DIR="/etc/presto-config"
    PRESTO_CONFIG_DIR="/opt/presto-server/etc"

    cp "${CONFIG_TEMPLATE_DIR}/presto-worker-config-config.properties" "${PRESTO_CONFIG_DIR}/config.properties"
    cp "${CONFIG_TEMPLATE_DIR}/presto-worker-config-node.properties" "${PRESTO_CONFIG_DIR}/node.properties"

    # Query coordinator for version and append to config
    DISCOVERY_URI="http://{{ include "clp.fullname" $ }}-presto-coordinator:8889"
    PRESTO_VERSION=$(curl -sf "${DISCOVERY_URI}/v1/info" | jq -r '.nodeVersion.version')
    echo "presto.version=${PRESTO_VERSION}" >> "${PRESTO_CONFIG_DIR}/config.properties"

    # Set node identity from hostname
    echo "node.internal-address=$(hostname -i)" >> "${PRESTO_CONFIG_DIR}/node.properties"
    echo "node.id=$(hostname)" >> "${PRESTO_CONFIG_DIR}/node.properties"
{{- end }}{{/* with .Values.clpConfig.presto */}}
{{- end }}{{/* if has "presto" .Values.clpConfig.bundled */}}

{{- if and
  (not .Values.clpConfig.telemetry.disable)
  (has "otel_collector" .Values.clpConfig.bundled) }}
  otel-collector-config.yaml: |
    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"

    receivers:
      otlp:
        protocols:
          http:
            endpoint: "0.0.0.0:4318"

    processors:
      batch:
        timeout: "30s"
        send_batch_size: 1024
      resourcedetection:
        # NOTE: Kubernetes deployments do not mount the Docker socket, so use env and system
        # detection only.
        detectors: ["env", "system"]
        system:
          resource_attributes:
            host.name:
              enabled: false
            host.arch:
              enabled: true
            host.cpu.family:
              enabled: true
            host.cpu.model.id:
              enabled: true
            host.cpu.vendor.id:
              enabled: true
        override: false

    exporters:
      otlp_http:
        endpoint: {{ .Values.clpConfig.telemetry.endpoint | quote }}

    service:
      extensions: ["health_check"]
      pipelines:
        metrics:
          receivers: ["otlp"]
          processors: ["resourcedetection", "batch"]
          exporters: ["otlp_http"]
        traces:
          receivers: ["otlp"]
          processors: ["resourcedetection", "batch"]
          exporters: ["otlp_http"]
        logs:
          receivers: ["otlp"]
          processors: ["resourcedetection", "batch"]
          exporters: ["otlp_http"]
{{- end }}
