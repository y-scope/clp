{{- if and .Values.gateway .Values.gateway.enabled }}
apiVersion: "gateway.networking.k8s.io/v1"
kind: "HTTPRoute"
metadata:
  name: {{ include "clp.fullname" . }}-webui
  labels:
    {{- include "clp.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "clp.fullname" . }}
  rules:
    - matches:
        - path:
            type: "PathPrefix"
            value: "/"
      backendRefs:
        - name: {{ include "clp.fullname" . }}-webui
          port: 4000
{{- end }}
