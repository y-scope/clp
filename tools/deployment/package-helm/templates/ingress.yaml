{{- if .Values.ingress.enabled }}
{{- $hasApiServer := .Values.clpConfig.api_server }}
{{- $hasMcpServer := .Values.clpConfig.mcp_server }}
{{- $hasRewritePaths := or $hasApiServer $hasMcpServer }}
apiVersion: "networking.k8s.io/v1"
kind: "Ingress"
metadata:
  name: {{ include "clp.fullname" . }}
  labels:
    {{- include "clp.labels" . | nindent 4 }}
  {{- if or $hasRewritePaths .Values.ingress.annotations }}
  annotations:
    {{- if $hasRewritePaths }}
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          {{- if $hasApiServer }}
          - path: "/api/v2(/|$)(.*)"
            pathType: "ImplementationSpecific"
            backend:
              service:
                name: {{ include "clp.fullname" . }}-api-server
                port:
                  number: 3001
          {{- end }}
          {{- if $hasMcpServer }}
          - path: "/mcp(/|$)(.*)"
            pathType: "ImplementationSpecific"
            backend:
              service:
                name: {{ include "clp.fullname" . }}-mcp-server
                port:
                  number: 8000
          {{- end }}
          {{- if $hasRewritePaths }}
          - path: "/()(.*)"
            pathType: "ImplementationSpecific"
          {{- else }}
          - path: "/"
            pathType: "Prefix"
          {{- end }}
            backend:
              service:
                name: {{ include "clp.fullname" . }}-webui
                port:
                  number: 4000
{{- end }}
