{{- if and
  .Values.gateway
  .Values.gateway.enabled
  .Values.clpConfig.log_ingestor
  (eq .Values.clpConfig.logs_input.type "s3") }}
apiVersion: "gateway.networking.k8s.io/v1"
kind: "HTTPRoute"
metadata:
  name: {{ include "clp.fullname" . }}-log-ingestor
  labels:
    {{- include "clp.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "clp.fullname" . }}
  rules:
    - matches:
        - path:
            type: "PathPrefix"
            value: "/log_ingestor"
      filters:
        - type: "URLRewrite"
          urlRewrite:
            path:
              type: "ReplacePrefixMatch"
              replacePrefixMatch: "/"
      backendRefs:
        - name: {{ include "clp.fullname" . }}-log-ingestor
          port: 3002
{{- end }}
