{{- if and .Values.gateway .Values.gateway.enabled .Values.clpConfig.mcp_server }}
apiVersion: "gateway.networking.k8s.io/v1"
kind: "HTTPRoute"
metadata:
  name: {{ include "clp.fullname" . }}-mcp-server
  labels:
    {{- include "clp.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "clp.fullname" . }}
  rules:
    - matches:
        - path:
            type: "PathPrefix"
            value: "/mcp"
      filters:
        - type: "URLRewrite"
          urlRewrite:
            path:
              type: "ReplacePrefixMatch"
              replacePrefixMatch: "/"
      backendRefs:
        - name: {{ include "clp.fullname" . }}-mcp-server
          port: 8000
{{- end }}
