{{- if and .Values.clpConfig.presto (has "presto" .Values.clpConfig.bundled) }}
apiVersion: "v1"
kind: "Service"
metadata:
  name: {{ include "clp.fullname" . }}-presto-coordinator
  labels:
    {{- include "clp.labels" . | nindent 4 }}
    app.kubernetes.io/component: "presto-coordinator"
spec:
  type: {{ default "NodePort" .Values.clpConfig.presto.serviceType | quote }}
  selector:
    {{- include "clp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: "presto-coordinator"
  ports:
    - port: 8889
      targetPort: "presto-coord"
      {{- if and
        (eq (default "NodePort" .Values.clpConfig.presto.serviceType) "NodePort")
        .Values.clpConfig.presto.port }}
      nodePort: {{ .Values.clpConfig.presto.port }}
      {{- end }}
{{- end }}
