{{- if and .Values.gateway .Values.gateway.enabled .Values.clpConfig.api_server }}
apiVersion: "gateway.networking.k8s.io/v1"
kind: "HTTPRoute"
metadata:
  name: {{ include "clp.fullname" . }}-api-server
  labels:
    {{- include "clp.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "clp.fullname" . }}
  rules:
    - matches:
        - path:
            type: "PathPrefix"
            value: "/api/v2"
      filters:
        - type: "URLRewrite"
          urlRewrite:
            path:
              type: "ReplacePrefixMatch"
              replacePrefixMatch: "/"
      backendRefs:
        - name: {{ include "clp.fullname" . }}-api-server
          port: 3001
{{- end }}
