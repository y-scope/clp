{{- if has "results_cache" .Values.clpConfig.bundled }}
apiVersion: "apps/v1"
kind: "StatefulSet"
metadata:
  name: {{ include "clp.fullname" . }}-results-cache
  labels:
    {{- include "clp.labels" . | nindent 4 }}
    app.kubernetes.io/component: "results-cache"
spec:
  serviceName: {{ include "clp.fullname" . }}-results-cache
  replicas: 1
  selector:
    matchLabels:
      {{- include "clp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: "results-cache"
  template:
    metadata:
      labels:
        {{- include "clp.labels" . | nindent 8 }}
        app.kubernetes.io/component: "results-cache"
    spec:
      {{- include "clp.createSchedulingConfigs" (dict
          "root" .
          "component" "resultsCache"
        ) | nindent 6 }}
      containers:
        - name: "results-cache"
          image: "mongo:8.0.21"
          imagePullPolicy: "Always"
          ports:
            - name: "results-cache"
              containerPort: 27017
          volumeMounts:
            - name: {{ include "clp.volumeName" (dict
                "component_category" "results-cache"
                "name" "data"
              ) | quote }}
              mountPath: "/data/db"
            - name: "config"
              mountPath: "/etc/mongo/mongod.conf"
              subPath: "mongod.conf"
              readOnly: true
          args: [
            "--config", "/etc/mongo/mongod.conf",
            "--bind_ip", "0.0.0.0"
          ]
          readinessProbe:
            {{- include "clp.readinessProbeTimings" . | nindent 12 }}
            exec: &results-cache-health-check
              command:
                - "mongosh"
                - "127.0.0.1:27017/test"
                - "--quiet"
                - "--eval"
                - "db.runCommand('ping').ok"
          livenessProbe:
            {{- include "clp.livenessProbeTimings" . | nindent 12 }}
            exec: *results-cache-health-check
        - name: "results-cache-init"
          image: "{{ include "clp.image.ref" . }}"
          imagePullPolicy: "{{ .Values.image.clpPackage.pullPolicy }}"
          env:
            - name: "PYTHONPATH"
              value: "/opt/clp/lib/python3/site-packages"
          command:
            - "/bin/sh"
            - "-c"
            - |
              until python3 -c "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 27017)); s.close()" 2>/dev/null; do
                sleep 1
              done
              python3 -u -m clp_py_utils.initialize-results-cache \
                --uri "mongodb://127.0.0.1:27017/{{ .Values.clpConfig.results_cache.db_name }}" \
                --member-host "{{ include "clp.fullname" . }}-results-cache:27017" \
                --stream-collection {{ .Values.clpConfig.results_cache.stream_collection_name | quote }}
              touch /tmp/init-complete
              sleep infinity
          readinessProbe:
            {{- include "clp.readinessProbeTimings" . | nindent 12 }}
            exec:
              command:
                - "test"
                - "-f"
                - "/tmp/init-complete"
      volumes:
        - name: "config"
          configMap:
            name: {{ include "clp.fullname" . }}-config
  volumeClaimTemplates:
    - metadata:
        name: {{ include "clp.volumeName" (dict
            "component_category" "results-cache"
            "name" "data"
          ) | quote }}
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: "10Gi"
{{- end }}
