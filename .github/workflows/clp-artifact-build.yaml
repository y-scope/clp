name: "clp-artifact-build"

on:
  pull_request:
    paths-ignore: &ignored_paths
      - ".github/*"
      - ".github/ISSUE_TEMPLATE/**"
      - "components/core/tools/scripts/lib_install/macos/**"
      - "docs/**"
  push:
    paths-ignore: *ignored_paths
  schedule:
    # Run daily at 00:15 UTC (the 15 is to avoid periods of high load)
    - cron: "15 0 * * *"
  workflow_dispatch:

env:
  DEPS_IMAGE_NAME_PREFIX_AARCH64: "clp-core-dependencies-aarch64-"
  BINARIES_ARTIFACT_NAME_PREFIX: "clp-core-binaries-"
  PACKAGE_ARTIFACT_NAME_PREFIX: "clp-package-"
  PACKAGE_IMAGE_ARTIFACT_NAME_PREFIX: "clp-package-image-"
  PYTHON_WHEELS_ARTIFACT_NAME_PREFIX: "clp-python-wheels-"
  DEPS_IMAGE_NAME_PREFIX_X86: "clp-core-dependencies-x86-"
  # Bare (no arch) prefix for multi-arch dependency images; the arch is carried in the tag
  # (e.g. ":main-amd64") by clp-core-build-containers' `arch` input and merged into a
  # multi-arch ":main" manifest by the *-deps-image-merge jobs.
  DEPS_IMAGE_NAME_PREFIX: "clp-core-dependencies-"

concurrency:
  group: "${{github.workflow}}-${{github.ref}}"

  # Cancel in-progress jobs for efficiency. Exclude the `main` branch to allow uninterrupted
  # publishing of container images.
  cancel-in-progress: "${{github.ref != 'refs/heads/main'}}"

jobs:
  filter-relevant-changes:
    name: "filter-relevant-changes"
    runs-on: &runner >-
      ${{
        github.repository_owner == 'y-scope'
        && fromJSON('["self-hosted", "x64", "ubuntu-noble"]')
        || 'ubuntu-24.04'
      }}
    outputs:
      centos_stream_9_image_changed: "${{steps.filter.outputs.centos_stream_9_image}}"
      manylinux_2_28_image_changed: "${{steps.filter.outputs.manylinux_2_28_image}}"
      musllinux_1_2_image_changed: "${{steps.filter.outputs.musllinux_1_2_image}}"
      ubuntu_jammy_image_changed: "${{steps.filter.outputs.ubuntu_jammy_image}}"
      clp_changed: "${{steps.filter.outputs.clp}}"
      yscope_clp_core_changed: "${{steps.filter.outputs.yscope-clp-core}}"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - name: "Work around actions/runner-images/issues/6775"
        run: "chown $(id -u):$(id -g) -R ."
        shell: "bash"

      - name: "Filter relevant changes"
        uses: "dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36"
        id: "filter"
        with:
          # Consider changes between the current commit and `main`
          # NOTE: If a pull request changes one of the images, then we need to (1) build the image
          # (based on commits in the PR) and then (2) build CLP using the changed image. If a pull
          # request doesn't change an image, then we don't need to rebuild the image; instead we can
          # use the published image which is based on `main`. So when determining what files have
          # changed, we need to consider the delta between the current commit and `main` (rather
          # than the current and previous commits) in order to detect if we need to rebuild the
          # image (since it would be different from the published image).
          base: "main"
          filters: |
            # NOTE: This filter defines a reusable YAML anchor; its output is unused.
            _deps_images_common_paths: &_deps_images_common_paths
              - ".github/actions/**"
              - ".github/workflows/clp-artifact-build.yaml"
              - "components/core/tools/scripts/corporate-proxy-container.sh"
              - "components/core/tools/scripts/corporate-proxy-host.sh"
              - "components/core/tools/scripts/lib_install/*.sh"
              - "components/core/tools/scripts/lib_install/pipx-packages/**"
            centos_stream_9_image:
              - *_deps_images_common_paths
              - "components/core/tools/docker-images/clp-env-base-centos-stream-9/**"
              - "components/core/tools/scripts/lib_install/centos-stream-9/**"
            manylinux_2_28_image:
              - *_deps_images_common_paths
              - "components/core/tools/docker-images/clp-env-base-manylinux_2_28/**"
              - "components/core/tools/scripts/lib_install/manylinux_2_28/**"
            musllinux_1_2_image:
              - *_deps_images_common_paths
              - "components/core/tools/docker-images/clp-env-base-musllinux_1_2/**"
              - "components/core/tools/scripts/lib_install/musllinux_1_2/**"
            ubuntu_jammy_image:
              - *_deps_images_common_paths
              - "components/core/tools/docker-images/clp-env-base-ubuntu-jammy/**"
              - "components/core/tools/scripts/lib_install/ubuntu-jammy/**"
            clp:
              - ".github/actions/**"
              - ".github/workflows/clp-artifact-build.yaml"
              - ".gitmodules"
              - "components/core/cmake/**"
              - "components/core/CMakeLists.txt"
              - "components/core/src/**"
              - "components/core/tests/**"
              - "components/core/tools/scripts/utils/build-and-run-unit-tests.py"
              - "taskfile.yaml"
              - "taskfiles/**"
              - "tools/scripts/deps-download/**"
            yscope-clp-core:
              - ".github/actions/**"
              - ".github/workflows/clp-artifact-build.yaml"
              - ".gitmodules"
              - "taskfile.yaml"
              - "taskfiles/**"
              - "python-wheels/yscope-clp-core/**"

  centos-stream-9-deps-image:
    name: "centos-stream-9-deps-image"
    if: "needs.filter-relevant-changes.outputs.centos_stream_9_image_changed == 'true'"
    needs: "filter-relevant-changes"
    runs-on: *runner
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - name: "Work around actions/runner-images/issues/6775"
        run: "chown $(id -u):$(id -g) -R ."
        shell: "bash"

      - uses: "./.github/actions/clp-core-build-containers"
        env:
          OS_NAME: "centos-stream-9"
        with:
          image_name: "${{env.DEPS_IMAGE_NAME_PREFIX_X86}}${{env.OS_NAME}}"
          docker_context: "components/core"
          docker_file: "components/core/tools/docker-images/clp-env-base-${{env.OS_NAME}}\
            /Dockerfile"
          push_deps_image: >-
            ${{github.event_name != 'pull_request' && github.ref == 'refs/heads/main'}}
          token: "${{secrets.GITHUB_TOKEN}}"

  manylinux_2_28-deps-image:
    name: "manylinux_2_28-${{matrix.arch}}-deps-image"
    if: "needs.filter-relevant-changes.outputs.manylinux_2_28_image_changed == 'true'"
    needs: "filter-relevant-changes"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: "amd64"
            runner: *runner
          - arch: "arm64"
            runner: "ubuntu-24.04-arm"
    runs-on: "${{matrix.runner}}"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - name: "Work around actions/runner-images/issues/6775"
        run: "chown $(id -u):$(id -g) -R ."
        shell: "bash"

      - uses: "./.github/actions/clp-core-build-containers"
        env:
          OS_NAME: "manylinux_2_28"
        with:
          image_name: "${{env.DEPS_IMAGE_NAME_PREFIX}}${{env.OS_NAME}}"
          arch: "${{matrix.arch}}"
          docker_context: "components/core"
          docker_file: "components/core/tools/docker-images/clp-env-base-${{env.OS_NAME}}\
            /Dockerfile"
          push_deps_image: >-
            ${{github.event_name != 'pull_request' && github.ref == 'refs/heads/main'}}
          token: "${{secrets.GITHUB_TOKEN}}"

  manylinux_2_28-deps-image-merge:
    name: "manylinux_2_28-deps-image-merge"
    # Only merge per-arch tags into a multi-arch ":main" manifest on push to main; on PRs the
    # deps image is consumed as a local tar artifact, so no merge is needed. Gated on the
    # manylinux deps-image matrix result, which is 'success' only when both arch legs
    # (amd64 + arm64) succeeded and pushed their arch-suffixed ":main-<arch>" tags.
    if: >-
      github.event_name != 'pull_request'
      && github.ref == 'refs/heads/main'
      && needs.manylinux_2_28-deps-image.result == 'success'
    needs:
      - "manylinux_2_28-deps-image"
    runs-on: *runner
    steps:
      - name: "Login to Image Registry"
        uses: "docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121"  # v4.1.0
        with:
          registry: "ghcr.io"
          username: "${{github.actor}}"
          password: "${{secrets.GITHUB_TOKEN}}"

      - name: "Sanitize Repository Name"
        id: "sanitization"
        shell: "bash"
        run: |
          echo "REPOSITORY=$(echo '${{github.repository}}' | tr '[:upper:]' '[:lower:]')" \
            >> "$GITHUB_OUTPUT"

      - name: "Create and Push Multi-arch Manifest"
        shell: "bash"
        run: |
          image_base="ghcr.io/${{steps.sanitization.outputs.REPOSITORY}}/${{env.DEPS_IMAGE_NAME_PREFIX}}manylinux_2_28"
          docker manifest create "${image_base}:main" \
            "${image_base}:main-amd64" \
            "${image_base}:main-arm64"
          docker manifest push "${image_base}:main"

  musllinux_1_2-deps-image-merge:
    name: "musllinux_1_2-deps-image-merge"
    # Only merge per-arch tags into a multi-arch ":main" manifest on push to main; on PRs the
    # deps image is consumed as a local tar artifact, so no merge is needed. Gated on the
    # musllinux deps-image matrix result, which is 'success' only when both arch legs
    # (amd64 + arm64) succeeded and pushed their arch-suffixed ":main-<arch>" tags.
    if: >-
      github.event_name != 'pull_request'
      && github.ref == 'refs/heads/main'
      && needs.musllinux_1_2-deps-image.result == 'success'
    needs:
      - "musllinux_1_2-deps-image"
    runs-on: *runner
    steps:
      - name: "Login to Image Registry"
        uses: "docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121"  # v4.1.0
        with:
          registry: "ghcr.io"
          username: "${{github.actor}}"
          password: "${{secrets.GITHUB_TOKEN}}"

      - name: "Sanitize Repository Name"
        id: "sanitization"
        shell: "bash"
        run: |
          echo "REPOSITORY=$(echo '${{github.repository}}' | tr '[:upper:]' '[:lower:]')" \
            >> "$GITHUB_OUTPUT"

      - name: "Create and Push Multi-arch Manifest"
        shell: "bash"
        run: |
          image_base="ghcr.io/${{steps.sanitization.outputs.REPOSITORY}}/${{env.DEPS_IMAGE_NAME_PREFIX}}musllinux_1_2"
          docker manifest create "${image_base}:main" \
            "${image_base}:main-amd64" \
            "${image_base}:main-arm64"
          docker manifest push "${image_base}:main"

  musllinux_1_2-deps-image:
    name: "musllinux_1_2-${{matrix.arch}}-deps-image"
    if: "needs.filter-relevant-changes.outputs.musllinux_1_2_image_changed == 'true'"
    needs: "filter-relevant-changes"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: "amd64"
            runner: *runner
          - arch: "arm64"
            runner: "ubuntu-24.04-arm"
    runs-on: "${{matrix.runner}}"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - name: "Work around actions/runner-images/issues/6775"
        run: "chown $(id -u):$(id -g) -R ."
        shell: "bash"

      - uses: "./.github/actions/clp-core-build-containers"
        env:
          OS_NAME: "musllinux_1_2"
        with:
          image_name: "${{env.DEPS_IMAGE_NAME_PREFIX}}${{env.OS_NAME}}"
          arch: "${{matrix.arch}}"
          docker_context: "components/core"
          docker_file: "components/core/tools/docker-images/clp-env-base-${{env.OS_NAME}}\
            /Dockerfile"
          push_deps_image: >-
            ${{github.event_name != 'pull_request' && github.ref == 'refs/heads/main'}}
          token: "${{secrets.GITHUB_TOKEN}}"

  ubuntu-jammy-x86_64-deps-image:
    name: "ubuntu-jammy-x86_64-deps-image"
    if: "needs.filter-relevant-changes.outputs.ubuntu_jammy_image_changed == 'true'"
    needs: "filter-relevant-changes"
    runs-on: *runner
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - name: "Work around actions/runner-images/issues/6775"
        run: "chown $(id -u):$(id -g) -R ."
        shell: "bash"

      - uses: "./.github/actions/clp-core-build-containers"
        env:
          OS_NAME: "ubuntu-jammy"
        with:
          image_name: "${{env.DEPS_IMAGE_NAME_PREFIX_X86}}${{env.OS_NAME}}"
          docker_context: "components/core"
          docker_file: "components/core/tools/docker-images/clp-env-base-${{env.OS_NAME}}\
            /Dockerfile"
          push_deps_image: >-
            ${{github.event_name != 'pull_request' && github.ref == 'refs/heads/main'}}
          token: "${{secrets.GITHUB_TOKEN}}"

  ubuntu-jammy-aarch64-deps-image:
    name: "ubuntu-jammy-aarch64-deps-image"
    if: >-
      needs.filter-relevant-changes.outputs.ubuntu_jammy_image_changed == 'true'
      && github.event_name != 'pull_request'
      && github.ref == 'refs/heads/main'
    needs: "filter-relevant-changes"
    runs-on: "ubuntu-24.04-arm"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - name: "Work around actions/runner-images/issues/6775"
        run: "chown $(id -u):$(id -g) -R ."
        shell: "bash"

      - uses: "./.github/actions/clp-core-build-containers"
        env:
          OS_NAME: "ubuntu-jammy"
        with:
          image_name: "${{env.DEPS_IMAGE_NAME_PREFIX_AARCH64}}${{env.OS_NAME}}"
          docker_context: "components/core"
          docker_file: "components/core/tools/docker-images/clp-env-base-${{env.OS_NAME}}\
            /Dockerfile"
          push_deps_image: >-
            ${{github.event_name != 'pull_request' && github.ref == 'refs/heads/main'}}
          token: "${{secrets.GITHUB_TOKEN}}"

  centos-stream-9-binaries:
    # Run if the ancestor jobs succeeded OR they were skipped and clp was changed.
    if: >-
      success()
      || (!cancelled() && !failure() && needs.filter-relevant-changes.outputs.clp_changed == 'true')
    needs:
      - "centos-stream-9-deps-image"
      - "filter-relevant-changes"
    strategy:
      matrix:
        use_shared_libs: [true, false]
    name: "centos-stream-9-${{matrix.use_shared_libs == true && 'dynamic' || 'static'}}-linked-bins"
    continue-on-error: true
    runs-on: *runner
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - name: "Work around actions/runner-images/issues/6775"
        run: "chown $(id -u):$(id -g) -R ."
        shell: "bash"

      - uses: "./.github/actions/run-on-image"
        env:
          OS_NAME: "centos-stream-9"
        with:
          image_name: "${{env.DEPS_IMAGE_NAME_PREFIX_X86}}${{env.OS_NAME}}"
          use_published_image: >-
            ${{needs.filter-relevant-changes.outputs.centos_stream_9_image_changed == 'false'
            || (github.event_name != 'pull_request' && github.ref == 'refs/heads/main')}}
          run_command: >-
            CLP_CPP_MAX_PARALLELISM_PER_BUILD_TASK=$(getconf _NPROCESSORS_ONLN) task deps:core
            && python3 /mnt/repo/components/core/tools/scripts/utils/build-and-run-unit-tests.py
            ${{matrix.use_shared_libs == true && '--use-shared-libs' || ''}}
            --source-dir /mnt/repo/components/core
            --build-dir /mnt/repo/components/core/build
            --num-jobs $(getconf _NPROCESSORS_ONLN)

  manylinux_2_28-x86_64-binaries:
    # Run if the ancestor jobs succeeded OR they were skipped and clp was changed.
    if: >-
      success()
      || (!cancelled() && !failure() && (
        needs.filter-relevant-changes.outputs.clp_changed == 'true'
        || needs.filter-relevant-changes.outputs.manylinux_2_28_image_changed == 'true'
      ))
    needs:
      - "manylinux_2_28-deps-image"
      - "manylinux_2_28-deps-image-merge"
      - "filter-relevant-changes"
    strategy:
      matrix:
        use_shared_libs: [true, false]
    name: >-
      manylinux_2_28-x86_64-${{matrix.use_shared_libs == true && 'dynamic' || 'static'}}-linked-bins
    continue-on-error: true
    runs-on: *runner
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - name: "Work around actions/runner-images/issues/6775"
        run: "chown $(id -u):$(id -g) -R ."
        shell: "bash"

      - uses: "./.github/actions/run-on-image"
        env:
          OS_NAME: "manylinux_2_28"
        with:
          image_name: "${{env.DEPS_IMAGE_NAME_PREFIX}}${{env.OS_NAME}}"
          arch: "amd64"
          use_published_image: >-
            ${{needs.filter-relevant-changes.outputs.manylinux_2_28_image_changed == 'false'
            || (github.event_name != 'pull_request' && github.ref == 'refs/heads/main')}}
          run_command: >-
            CLP_CPP_MAX_PARALLELISM_PER_BUILD_TASK=$(getconf _NPROCESSORS_ONLN) task deps:core
            && python3 /mnt/repo/components/core/tools/scripts/utils/build-and-run-unit-tests.py
            ${{matrix.use_shared_libs == true && '--use-shared-libs' || ''}}
            --source-dir /mnt/repo/components/core
            --build-dir /mnt/repo/components/core/build
            --num-jobs $(getconf _NPROCESSORS_ONLN)

  manylinux_2_28-x86_64-python-wheels:
    # Run if the ancestor jobs succeeded OR they were skipped and clp was changed.
    if: >-
      success() || (!cancelled() && !failure() && (
        needs.filter-relevant-changes.outputs.clp_changed == 'true'
        || needs.filter-relevant-changes.outputs.yscope_clp_core_changed == 'true'
        || needs.filter-relevant-changes.outputs.manylinux_2_28_image_changed == 'true'
      ))
    needs:
      - "filter-relevant-changes"
      - "manylinux_2_28-deps-image"
      - "manylinux_2_28-deps-image-merge"
    env:
      OS_NAME: "manylinux_2_28"
    name: "manylinux_2_28-x86_64-python-wheels"
    continue-on-error: true
    runs-on: *runner
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - name: "Work around actions/runner-images/issues/6775"
        run: "chown $(id -u):$(id -g) -R ."
        shell: "bash"

      - uses: "./.github/actions/run-on-image"
        with:
          image_name: "${{env.DEPS_IMAGE_NAME_PREFIX}}${{env.OS_NAME}}"
          arch: "amd64"
          use_published_image: >-
            ${{needs.filter-relevant-changes.outputs.manylinux_2_28_image_changed == 'false'
            || (github.event_name != 'pull_request' && github.ref == 'refs/heads/main')}}
          run_command: >-
            CLP_CPP_MAX_PARALLELISM_PER_BUILD_TASK=$(getconf _NPROCESSORS_ONLN)
            task python-wheels-yscope-clp-core

      - id: "copy_wheels"
        run: |-
          output_dir="/tmp/${{env.PYTHON_WHEELS_ARTIFACT_NAME_PREFIX}}${{env.OS_NAME}}"
          echo "output_dir=${output_dir}" >> "$GITHUB_OUTPUT"
          mkdir -p "${output_dir}"
          tar \
            --create \
            --verbose \
            --file "${output_dir}/python-wheels.tar" \
            --directory "$GITHUB_WORKSPACE/build/python-wheels" \
            .
        shell: "bash"

      - uses: "actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f"  # v6.0.0
        with:
          name: "${{env.PYTHON_WHEELS_ARTIFACT_NAME_PREFIX}}${{env.OS_NAME}}"
          path: "${{steps.copy_wheels.outputs.output_dir}}"
          retention-days: 1

  musllinux_1_2-x86_64-binaries:
    # Run if the ancestor jobs succeeded OR they were skipped and clp was changed.
    if: >-
      success()
      || (!cancelled() && !failure() && (
        needs.filter-relevant-changes.outputs.clp_changed == 'true'
        || needs.filter-relevant-changes.outputs.musllinux_1_2_image_changed == 'true'
      ))
    needs:
      - "musllinux_1_2-deps-image"
      - "musllinux_1_2-deps-image-merge"
      - "filter-relevant-changes"
    strategy:
      matrix:
        use_shared_libs: [true, false]
    name: >-
      musllinux_1_2-x86_64-${{matrix.use_shared_libs == true && 'dynamic' || 'static'}}-linked-bins
    continue-on-error: true
    runs-on: *runner
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - name: "Work around actions/runner-images/issues/6775"
        run: "chown $(id -u):$(id -g) -R ."
        shell: "bash"

      - uses: "./.github/actions/run-on-image"
        env:
          OS_NAME: "musllinux_1_2"
        with:
          image_name: "${{env.DEPS_IMAGE_NAME_PREFIX}}${{env.OS_NAME}}"
          arch: "amd64"
          use_published_image: >-
            ${{needs.filter-relevant-changes.outputs.musllinux_1_2_image_changed == 'false'
            || (github.event_name != 'pull_request' && github.ref == 'refs/heads/main')}}
          run_command: >-
            CLP_CPP_MAX_PARALLELISM_PER_BUILD_TASK=$(getconf _NPROCESSORS_ONLN) task deps:core
            && python3 /mnt/repo/components/core/tools/scripts/utils/build-and-run-unit-tests.py
            ${{matrix.use_shared_libs == true && '--use-shared-libs' || ''}}
            --source-dir /mnt/repo/components/core
            --build-dir /mnt/repo/components/core/build
            --num-jobs $(getconf _NPROCESSORS_ONLN)

  ubuntu-jammy-binaries:
    # Run if the ancestor jobs succeeded OR they were skipped and clp was changed.
    if: >-
      success()
      || (!cancelled() && !failure() && needs.filter-relevant-changes.outputs.clp_changed == 'true')
    needs:
      - "filter-relevant-changes"
      - "ubuntu-jammy-x86_64-deps-image"
    strategy:
      matrix:
        include:
          - use_shared_libs: true
            upload_binaries: false
          - use_shared_libs: false
            upload_binaries: true
    env:
      OS_NAME: "ubuntu-jammy"
    name: "ubuntu-jammy-${{matrix.use_shared_libs == true && 'dynamic' || 'static'}}-linked-bins"
    continue-on-error: true
    runs-on: *runner
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - name: "Work around actions/runner-images/issues/6775"
        run: "chown $(id -u):$(id -g) -R ."
        shell: "bash"

      - uses: "./.github/actions/run-on-image"
        with:
          image_name: "${{env.DEPS_IMAGE_NAME_PREFIX_X86}}${{env.OS_NAME}}"
          use_published_image: >-
            ${{needs.filter-relevant-changes.outputs.ubuntu_jammy_image_changed == 'false'
            || (github.event_name != 'pull_request' && github.ref == 'refs/heads/main')}}
          run_command: >-
            CLP_CPP_MAX_PARALLELISM_PER_BUILD_TASK=$(getconf _NPROCESSORS_ONLN) task deps:core
            && python3 /mnt/repo/components/core/tools/scripts/utils/build-and-run-unit-tests.py
            ${{matrix.use_shared_libs == true && '--use-shared-libs' || ''}}
            --source-dir /mnt/repo/components/core
            --build-dir /mnt/repo/components/core/build
            --num-jobs $(getconf _NPROCESSORS_ONLN)

      - if: "matrix.upload_binaries == true"
        id: "copy_binaries"
        run: |-
          output_dir="/tmp/${{env.BINARIES_ARTIFACT_NAME_PREFIX}}${{env.OS_NAME}}"
          echo "output_dir=${output_dir}" >> "$GITHUB_OUTPUT"

          mkdir -p "${output_dir}"
          cd "$GITHUB_WORKSPACE/components/core/build"
          tar cfvv "${output_dir}/clp.tar" clg clp clp-s glt make-dictionaries-readable
        shell: "bash"

      - if: "matrix.upload_binaries == true"
        uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02"
        with:
          name: "${{env.BINARIES_ARTIFACT_NAME_PREFIX}}${{env.OS_NAME}}"
          path: "${{steps.copy_binaries.outputs.output_dir}}"
          retention-days: 1

  ubuntu-jammy-binaries-image:
    name: "ubuntu-jammy-binaries-image"
    # Run if the ancestor jobs were successful/skipped and building clp was successful.
    if: "!cancelled() && !failure() && needs.ubuntu-jammy-binaries.result == 'success'"
    needs: "ubuntu-jammy-binaries"
    runs-on: *runner
    env:
      OS_NAME: "ubuntu-jammy"
      TMP_OUTPUT_DIR: "/tmp"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - name: "Work around actions/runner-images/issues/6775"
        run: "chown $(id -u):$(id -g) -R ."
        shell: "bash"

      - uses: "actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e"
        with:
          name: "${{env.BINARIES_ARTIFACT_NAME_PREFIX}}${{env.OS_NAME}}"
          path: "${{env.TMP_OUTPUT_DIR}}/${{env.BINARIES_ARTIFACT_NAME_PREFIX}}${{env.OS_NAME}}"

      - name: "Untar binaries"
        working-directory: >-
          ${{env.TMP_OUTPUT_DIR}}/${{env.BINARIES_ARTIFACT_NAME_PREFIX}}${{env.OS_NAME}}
        run: |-
          tar xf clp.tar
          rm clp.tar

      - uses: "docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121"  # v4.1.0
        with:
          registry: "ghcr.io"
          username: "${{github.actor}}"
          password: "${{secrets.GITHUB_TOKEN}}"

      - name: "Sanitize the repo's name"
        id: "sanitize_repo_name"
        run: |-
          # Docker doesn't support repository names with uppercase characters, so we convert to
          # lowercase here.
          lowercase_repo=$(echo '${{github.repository}}' | tr '[:upper:]' '[:lower:]')
          echo "repository=${lowercase_repo}" >> "$GITHUB_OUTPUT"
        shell: "bash"

      - id: "core_image_meta"
        uses: "docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804"
        with:
          images: >-
            ghcr.io/${{steps.sanitize_repo_name.outputs.repository}}/clp-core-x86-${{env.OS_NAME}}
          tags: "type=raw,value=${{github.ref_name}}"

      # Only publish the image if this workflow was triggered by a push to `main`.
      # NOTE: We run the rest of the job to test that the binaries were uploaded correctly.
      - if: "github.event_name == 'push' && github.ref == 'refs/heads/main'"
        uses: "docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4"
        with:
          context: "${{env.TMP_OUTPUT_DIR}}/${{env.BINARIES_ARTIFACT_NAME_PREFIX}}${{env.OS_NAME}}"
          file: "components/core/tools/docker-images/clp-core-${{env.OS_NAME}}/Dockerfile"
          push: true
          tags: "${{steps.core_image_meta.outputs.tags}}"
          labels: "${{steps.core_image_meta.outputs.labels}}"

  ubuntu-jammy-lint:
    name: "ubuntu-jammy-lint"
    # Run if the ancestor jobs succeeded OR they were skipped and clp was changed.
    if: >-
      success()
      || (!cancelled() && !failure() && needs.filter-relevant-changes.outputs.clp_changed == 'true')
    needs:
      - "filter-relevant-changes"
      - "ubuntu-jammy-x86_64-deps-image"
    runs-on: *runner
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          # Fetch history so that the `clang-tidy-diff` task can compare against the main branch.
          fetch-depth: 0
          submodules: "recursive"

      - name: "Work around actions/runner-images/issues/6775"
        run: "chown $(id -u):$(id -g) -R ."
        shell: "bash"

      # NOTE: We don't restore the cache for `schedule` runs so that below,
      # `lint:check-cpp-static-full` runs on all files. If we don't do this periodically,
      # `lint:check-cpp-static-full` could miss issues in files that haven't changed but depend on
      # files which have changed.
      - if: "'schedule' != github.event_name"
        name: "Restore lint:check-cpp-static-full cache"
        id: "cache-restore-lint-check-cpp-static-full"
        uses: "actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684"
        with:
          path: |
            .task/checksum/lint-check-cpp-static-full
            .task/checksum/utils-cpp-lint-clang-tidy-*
            build/lint-clang-tidy

          # NOTE: This key must be kept in-sync with the key prefix in the `actions/cache/save` step
          # below (we can't use the output of the current step since `schedule` workflow runs don't
          # run this step).
          key: "lint:check-cpp-static-full-on-ubuntu-24.04"

      - uses: "./.github/actions/run-on-image"
        env:
          OS_NAME: "ubuntu-jammy"
        with:
          image_name: "${{env.DEPS_IMAGE_NAME_PREFIX_X86}}${{env.OS_NAME}}"
          use_published_image: >-
            ${{needs.filter-relevant-changes.outputs.ubuntu_jammy_image_changed == 'false'
            || (github.event_name != 'pull_request' && github.ref == 'refs/heads/main')}}
          # TODO: We set HOME due to permission issues inside the container used in run-on-image.
          # See: https://github.com/y-scope/clp/issues/1145
          run_command: >-
            CLP_CPP_MAX_PARALLELISM_PER_BUILD_TASK=$(getconf _NPROCESSORS_ONLN)
            HOME=/tmp
            task lint:check-cpp-full

      # Cache the source file checksums and the generated files (logs) for the
      # lint:check-cpp-static-full task, but only if it runs successfully on the main branch.
      # NOTE: If we don't cache the generated files, the task will re-run to generate them.
      - if: "'pull_request' != github.event_name && 'refs/heads/main' == github.ref"
        name: "Update lint:check-cpp-static-full cache"
        uses: "actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684"
        with:
          path: |
            .task/checksum/lint-check-cpp-static-full
            .task/checksum/utils-cpp-lint-clang-tidy-*
            build/lint-clang-tidy

          # NOTE: This key prefix (without the hash) must be kept in-sync with the
          # `actions/cache/restore` step above.
          key: >-
            lint:check-cpp-static-full-on-ubuntu-24.04-${{hashFiles(
              '.task/checksum/lint-check-cpp-static-full',
              '.task/checksum/utils-cpp-lint-clang-tidy-*',
              'build/lint-clang-tidy/**/*'
            )}}

  ubuntu-jammy-integration-tests-package:
    name: "ubuntu-jammy-integration-tests-package"
    if: >-
      !cancelled() && !failure() && needs.package-image.result == 'success'
    needs:
      - "package-image"
    strategy:
      matrix:
        arch: >-
          ${{github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
          && fromJSON('["amd64", "arm64"]') || fromJSON('["amd64"]')}}
    runs-on: *runner
    env:
      BUILD_DIR: "build"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - name: "Download the package artifact"
        uses: "actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e"
        with:
          name: "${{env.PACKAGE_ARTIFACT_NAME_PREFIX}}${{matrix.arch}}"
          path: "${{env.BUILD_DIR}}/clp-package"

      - name: "Untar the package"
        working-directory: "${{env.BUILD_DIR}}/clp-package"
        run: |-
          tar xf clp-package.tar
          rm clp-package.tar

      - name: "Download the package image artifact"
        uses: "actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e"
        with:
          name: "${{env.PACKAGE_IMAGE_ARTIFACT_NAME_PREFIX}}${{matrix.arch}}"
          path: "${{env.BUILD_DIR}}/clp-package-image"

      - name: "Load the package image"
        shell: "bash"
        run: >-
          docker load
          --input
          ${{env.BUILD_DIR}}/clp-package-image/${{env.PACKAGE_IMAGE_ARTIFACT_NAME_PREFIX}}${{matrix.arch}}.tar

      - name: "Install uv"
        uses: "astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990"  # v8.3.2

      - name: "Install MariaDB connector"
        run: "sudo apt-get update && sudo apt-get install -y libmariadb-dev"

      - name: "Run package integration tests"
        working-directory: "integration-tests"
        run: >-
          CLP_BUILD_DIR=../${{env.BUILD_DIR}}
          CLP_PACKAGE_DIR=../${{env.BUILD_DIR}}/clp-package
          uv run pytest -m 'smoke or package'

      - name: "Upload the integration test logs"
        if: "always()"
        uses: "actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f"  # v6.0.0
        with:
          name: "clp-integration-test-package-logs"
          path: "${{env.BUILD_DIR}}/integration_tests/test_logs"
          retention-days: 3

  package-image:
    name: "package-image-${{matrix.arch}}"
    # NOTE: The aarch64 job is skipped on PRs, so we accept both 'success' and 'skipped'.
    if: >-
      !cancelled() && !failure() && (
        needs.filter-relevant-changes.outputs.ubuntu_jammy_image_changed == 'false' ||
        (needs.ubuntu-jammy-x86_64-deps-image.result == 'success'
        && (needs.ubuntu-jammy-aarch64-deps-image.result == 'success'
        || needs.ubuntu-jammy-aarch64-deps-image.result == 'skipped'))
      )
    needs:
      - "filter-relevant-changes"
      - "ubuntu-jammy-x86_64-deps-image"
      - "ubuntu-jammy-aarch64-deps-image"
    strategy:
      matrix:
        # Only build arm64 images on push to main to save CI resources on PRs.
        arch: >-
          ${{github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
          && fromJSON('["amd64", "arm64"]') || fromJSON('["amd64"]')}}
    runs-on: >-
      ${{
        matrix.arch == 'amd64'
        && (github.repository_owner == 'y-scope'
            && fromJSON('["self-hosted", "x64", "ubuntu-noble"]')
            || 'ubuntu-24.04')
        || (github.repository_owner == 'y-scope'
            && fromJSON('["self-hosted", "arm64", "ubuntu-noble"]')
            || 'ubuntu-24.04-arm')
      }}
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - name: "Workaround actions/runner-images/issues/6775"
        shell: "bash"
        run: "chown $(id -u):$(id -g) -R ."

      - name: "Build the package without the package image"
        uses: "./.github/actions/run-on-image"
        env:
          OS_NAME: "ubuntu-jammy"
        with:
          image_name: >-
            ${{format('{0}ubuntu-jammy',
            matrix.arch == 'amd64' && env.DEPS_IMAGE_NAME_PREFIX_X86
            || env.DEPS_IMAGE_NAME_PREFIX_AARCH64)}}
          use_published_image: >-
            ${{needs.filter-relevant-changes.outputs.ubuntu_jammy_image_changed == 'false'
            || (github.event_name != 'pull_request' && github.ref == 'refs/heads/main')}}
          run_command: >-
            CLP_CPP_MAX_PARALLELISM_PER_BUILD_TASK=$(getconf _NPROCESSORS_ONLN)
            HOME=/tmp
            task package-build-deps

      - id: "build-package-image"
        uses: "./.github/actions/clp-build-package-image"
        with:
          image_registry: "ghcr.io"
          image_registry_username: "${{github.actor}}"
          image_registry_password: "${{secrets.GITHUB_TOKEN}}"
          arch: "${{matrix.arch}}"
          platform_version_codename: "jammy"
          push_image: "${{github.event_name != 'pull_request' && github.ref == 'refs/heads/main'}}"

      - name: "Assemble the package directory structure"
        uses: "./.github/actions/run-on-image"
        env:
          OS_NAME: "ubuntu-jammy"
        with:
          image_name: >-
            ${{format('{0}ubuntu-jammy',
            matrix.arch == 'amd64' && env.DEPS_IMAGE_NAME_PREFIX_X86
            || env.DEPS_IMAGE_NAME_PREFIX_AARCH64)}}
          use_published_image: >-
            ${{needs.filter-relevant-changes.outputs.ubuntu_jammy_image_changed == 'false'
            || (github.event_name != 'pull_request' && github.ref == 'refs/heads/main')}}
          run_command: >-
            CLP_CPP_MAX_PARALLELISM_PER_BUILD_TASK=$(getconf _NPROCESSORS_ONLN)
            HOME=/tmp
            task package-assemble OUTPUT_DIR=build/clp-package

      - name: "Write the package image ID"
        shell: "bash"
        run: >-
          echo "${{steps.build-package-image.outputs.image_id}}"
          > "build/clp-package/clp-package-image.id"

      - name: "Tar the package directories"
        shell: "bash"
        run: >-
          tar --create --file "build/clp-package.tar"
          --directory "build/clp-package" .

      - name: "Upload the package tarball artifact"
        uses: "actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f"  # v6.0.0
        with:
          name: "${{env.PACKAGE_ARTIFACT_NAME_PREFIX}}${{matrix.arch}}"
          path: "build/clp-package.tar"
          retention-days: 1

  package-image-multiarch-manifest:
    name: "package-image-multiarch-manifest"
    if: >-
      github.event_name != 'pull_request'
      && github.ref == 'refs/heads/main'
      && needs.package-image.result == 'success'
    needs: "package-image"
    runs-on: *runner
    steps:
      - name: "Login to Image Registry"
        uses: "docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121"  # v4.1.0
        with:
          registry: "ghcr.io"
          username: "${{github.actor}}"
          password: "${{secrets.GITHUB_TOKEN}}"

      - name: "Sanitize Repository Name"
        id: "sanitization"
        shell: "bash"
        run: |
          echo "REPOSITORY=$(echo '${{github.repository}}' | tr '[:upper:]' '[:lower:]')" \
            >> "$GITHUB_OUTPUT"

      - name: "Create and Push Multi-arch Manifest"
        shell: "bash"
        run: |
          image_base="ghcr.io/${{steps.sanitization.outputs.REPOSITORY}}/clp-package"
          tags=("${{github.ref_name}}")
          if [ "${{github.event_name}}" = "schedule" ]; then
            tags+=("nightly")
          fi
          for tag in "${tags[@]}"; do
            docker manifest create "${image_base}:${tag}" \
              "${image_base}:${tag}-amd64" \
              "${image_base}:${tag}-arm64"
            docker manifest push "${image_base}:${tag}"
          done
