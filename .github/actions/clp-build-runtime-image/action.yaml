name: "clp-build-runtime-image"
description: "Builds a container image to be used for running CLP."

inputs:
  image_registry:
    default: "ghcr.io"
    description: "Container image registry"
    required: false
  image_registry_username:
    default: "${{github.actor}}"
    description: "Container image registry username"
    required: false
  image_registry_password:
    default: ""
    description: "Container image registry password"
    required: false
  arch:
    description: "Target architecture (amd64 or arm64)"
    default: "amd64"
    required: false
  platform_version_codename:
    description: >-
      Platform version codename (e.g. jammy, noble) used as the runtime image base version.
    required: true
  push_image:
    description: "Whether to publish the package image"
    required: true

outputs:
  image_id:
    description: "The ID of the built container image."
    value: "${{steps.build-and-push.outputs.imageid}}"

runs:
  using: "composite"
  steps:
    - name: "Set up Docker Buildx"
      uses: "docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2"

    - name: "Login to Image Registry"
      if: "inputs.push_image == 'true'"
      uses: "docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121"  # v4.1.0
      with:
        registry: "${{inputs.image_registry}}"
        username: "${{inputs.image_registry_username}}"
        password: "${{inputs.image_registry_password}}"

    - name: "Sanitize Repository Name"
      id: "sanitization"
      shell: "bash"
      run: |
        # Docker doesn't support repository names with uppercase characters, so we convert the
        # name to lowercase here.
        echo "REPOSITORY=$(echo '${{github.repository}}' | tr '[:upper:]' '[:lower:]')" \
          >> "$GITHUB_OUTPUT"

    - name: "Compute metadata"
      id: "compute-meta"
      shell: "bash"
      run: |
        base_path="./tools/docker-images"
        image_name="clp-package"
        dockerfile_path="$base_path/$image_name/Dockerfile"

        echo "DOCKERFILE=$dockerfile_path" >> "$GITHUB_OUTPUT"
        echo "IMAGE_NAME=$image_name" >> "$GITHUB_OUTPUT"

    - name: "Extract GitHub Metadata"
      id: "extract-gh-meta"
      uses: "docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804"
      with:
        images: "${{inputs.image_registry}}/${{steps.sanitization.outputs.REPOSITORY}}\
          /${{steps.compute-meta.outputs.IMAGE_NAME}}"
        flavor: |
          suffix=-${{inputs.arch}}

    - name: "Map arch to Docker platform"
      id: "map-arch"
      shell: "bash"
      run: |
        if [ "${{inputs.arch}}" = "arm64" ]; then
          echo "platform=linux/arm64" >> "$GITHUB_OUTPUT"
        elif [ "${{inputs.arch}}" = "amd64" ]; then
          echo "platform=linux/amd64" >> "$GITHUB_OUTPUT"
        else
          echo >&2 "ERROR: Unsupported arch '${{inputs.arch}}'. Must be 'amd64' or 'arm64'."
          exit 1
        fi

    - name: "Compute image output properties"
      id: "output-properties"
      shell: "bash"
      run: |
        image_name="${{steps.compute-meta.outputs.IMAGE_NAME}}"
        if [[ "${{inputs.push_image}}" == "true" ]]; then
          echo "image_output=type=registry" >> "$GITHUB_OUTPUT"
        else
          # Suffix with arch so the amd64/arm64 tars don't collide.
          image_path="/tmp/${image_name}-image-${{inputs.arch}}.tar"
          echo "image_path=${image_path}" >> "$GITHUB_OUTPUT"
          echo "image_output=type=docker,dest=${image_path}" >> "$GITHUB_OUTPUT"
        fi

    - name: "Build and Push"
      id: "build-and-push"
      uses: "docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4"
      with:
        context: "./"
        file: "${{steps.compute-meta.outputs.DOCKERFILE}}"
        platforms: "${{steps.map-arch.outputs.platform}}"
        # Disable provenance to create a simple image instead of a manifest list.
        # This allows `docker manifest create` to combine the per-arch images later.
        provenance: false
        outputs: "${{steps.output-properties.outputs.image_output}}"
        tags: "${{steps.extract-gh-meta.outputs.tags}}"
        labels: "${{steps.extract-gh-meta.outputs.labels}}"
        build-args: |
          UBUNTU_VERSION_CODENAME=${{inputs.platform_version_codename}}

    - name: "Upload package image as artifact"
      if: "inputs.push_image == 'false'"
      uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02"
      with:
        name: "clp-package-image-${{inputs.arch}}"
        path: "${{steps.output-properties.outputs.image_path}}"
        retention-days: 1
