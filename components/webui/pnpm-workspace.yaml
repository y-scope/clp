packages:
  - "packages/client"
  - "packages/common"
  - "packages/server"
  - "packages/yscope-log-viewer"

allowBuilds:
  '@swc/core': true
  esbuild: true
  unrs-resolver: true

overrides:
  '@types/node': "24.13.2"

# Required for pnpm deploy on v10+ when deploying workspace packages.
injectWorkspacePackages: true

# To preserve the effects of `pnpm install --frozen-lockfile` in `task webui`.
verifyDepsBeforeRun: false
