packages:
  - "packages/common"
  - "packages/client"
  - "packages/server"
  - "packages/yscope-log-viewer"

allowBuilds:
  '@swc/core': true
  esbuild: true
  unrs-resolver: true

confirmModulesPurge: false
minimumReleaseAge: 0
nodeLinker: hoisted
# Required for pnpm deploy on v10+ when deploying workspace packages.
injectWorkspacePackages: true
verifyDepsBeforeRun: false
