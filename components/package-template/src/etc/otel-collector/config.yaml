extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: "30s"
    send_batch_size: 1024
  resourcedetection:
    # Use the Docker detector so the containerized collector reports Docker host metadata instead of
    # only container metadata. This requires the /var/run/docker.sock mount in Docker Compose.
    detectors: ["docker", "system"]
    docker:
      resource_attributes:
        host.name:
          enabled: false
    system:
      resource_attributes:
        host.arch:
          enabled: true
        host.cpu.family:
          enabled: true
        host.cpu.model.id:
          enabled: true
        host.cpu.vendor.id:
          enabled: true
        host.name:
          enabled: false
    override: false
  resource/deployment:
    attributes:
      - key: clp.deployment.id
        value: "${env:CLP_DEPLOYMENT_ID}"
        action: insert
      - key: service.version
        value: "${env:CLP_SERVICE_VERSION}"
        action: insert
      - key: clp.deployment.method
        value: "${env:CLP_DEPLOYMENT_METHOD}"
        action: insert
      - key: clp.storage.engine
        value: "${env:CLP_STORAGE_ENGINE}"
        action: insert

exporters:
  otlphttp:
    endpoint: "${env:CLP_TELEMETRY_ENDPOINT}"

service:
  extensions: ["health_check"]
  pipelines:
    metrics:
      receivers: ["otlp"]
      processors: ["resourcedetection", "resource/deployment", "batch"]
      exporters: ["otlphttp"]
    traces:
      receivers: ["otlp"]
      processors: ["resourcedetection", "resource/deployment", "batch"]
      exporters: ["otlphttp"]
    logs:
      receivers: ["otlp"]
      processors: ["resourcedetection", "resource/deployment", "batch"]
      exporters: ["otlphttp"]
